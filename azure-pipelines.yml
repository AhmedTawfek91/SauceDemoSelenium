trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - main
      - master

pool:
  vmImage: 'ubuntu-latest'

steps:
  # 1. confirm Java version
  - task: JavaToolInstaller@0
    inputs:
      versionSpec: '17'
      jdkArchitectureOption: 'x64'
      jdkSourceOption: 'PreInstalled'
    displayName: 'Use Java 17'

  # 2. Install Chrome
  - script: |
      wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
      sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
      sudo apt-get update
      sudo apt-get install -y google-chrome-stable
      google-chrome --version
    displayName: 'Install Chrome'

  # 3. Run tests
  - task: Maven@4
    displayName: 'Run Selenium Tests'
    continueOnError: true
    inputs:
      mavenPomFile: 'pom.xml'
      goals: 'clean test'
      publishJUnitResults: true
      testResultsFiles: '**/surefire-reports/TEST-*.xml'

  # 4. Debug — list generated files
  - script: |
      echo "=== target folder ==="
      ls -la target/ || echo "target/ not found"
      echo "=== cucumber reports ==="
      find target -name "*.html" -o -name "*.json" -o -name "*.xml" 2>/dev/null
      echo "=== logs ==="
      ls -la logs/ || echo "logs/ not found"
    displayName: 'List generated files'
    condition: always()

  # 5. Upload all reports
  - task: PublishBuildArtifacts@1
    displayName: 'Upload Test Reports'
    condition: always()
    inputs:
      pathToPublish: 'target'
      artifactName: 'test-reports'